name: customers
description: |
  Customer accounts. One row per customer.
  Use for cohort and account-level reporting.

grain: one row per customer
primary_key: id

dimensions:
  - name: email
    sql: email
    type: text
    description: Primary contact email.

  - name: created_at
    sql: created_at
    type: timestamp
    description: When the customer account was created.

  - name: country
    sql: country
    type: text
    description: ISO country code for the billing address.

joins:
  - to: orders
    on: "customers.id = orders.customer_id"
    type: one_to_many

example_questions:
  - "How many new customers signed up last month?"
  - "Which countries have the most customers?"
