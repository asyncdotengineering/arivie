entities:
  - name: customers
    description: Eyewear shoppers — email and display name for order lookup and care routing.
    keywords: [customers, shoppers, email, accounts, loyalty]
  - name: orders
    description: DTC eyewear order headers — net revenue, status, channel, and refund linkage.
    keywords: [orders, revenue, sales, status, channel, aov, net_revenue]
  - name: order_items
    description: Line items with frame SKU, lens type, and per-eye Rx (sphere, cylinder, axis).
    keywords: [order_items, line_items, frames, lenses, prescription, rx, sku]
  - name: refunds
    description: Cash refunds bucketed by refund_date — not store-credit vouchers.
    keywords: [refunds, returns, chargebacks, refund_date]
  - name: remakes
    description: Prescription remake / redo requests (wrong Rx, breakage, fit issues).
    keywords: [remakes, redo, wrong_prescription, breakage, rx_correction]

glossary:
  - term: refund
    status: ambiguous
    definition: >
      Could mean a cash refund posted to the original payment method (refunds table),
      a store-credit voucher kept on the account, or a partial line-item adjustment.
      Ask which the customer or agent means before querying.
    entities: [orders, refunds]

  - term: store credit
    status: ambiguous
    definition: >
      Could mean an issued voucher not yet redeemed, a credit applied on a replacement order,
      or language the customer uses for any non-cash return. Distinct from refunds.amount —
      confirm whether they want cash refunds or account credit.
    entities: [orders, refunds]

  - term: net revenue
    status: defined
    definition: >
      Order total minus tax and shipping for statuses other than pending, cancelled, or failed.
      Returns are subtracted separately from refunds, bucketed by refund_date (ADR 0005).
    entities: [orders, refunds]