name: invoices
description: |
  Customer invoices for accounts receivable.
  Revenue recognition uses paid invoices; open invoices contribute to outstanding AR.

grain: one row per invoice
primary_key: id

measures:
  - name: recognized_revenue
    description: Revenue recognized from paid invoices in the period.
    sql: "SUM(amount) FILTER (WHERE status = 'paid')"

  - name: open_balance
    description: Unpaid invoice balance still outstanding.
    sql: "SUM(amount - amount_paid) FILTER (WHERE status IN ('sent', 'overdue'))"

dimensions:
  - name: status
    sql: status
    values: [draft, sent, paid, overdue, void]
    description: Invoice lifecycle status.

  - name: issued_at
    sql: issued_at
    type: timestamp
    description: When the invoice was issued.

joins:
  - to: customers
    on: "invoices.customer_id = customers.id"
    type: many_to_one

example_questions:
  - "What is recognized revenue from invoices this quarter?"
  - "How much AR is overdue?"

example_queries:
  - question: "Recognized revenue this quarter"
    sql: |
      SELECT SUM(amount) AS revenue
      FROM invoices
      WHERE status = 'paid'
        AND issued_at >= date_trunc('quarter', CURRENT_DATE)
