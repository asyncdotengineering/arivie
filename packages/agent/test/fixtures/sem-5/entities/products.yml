name: products
description: |
  Product catalog. One row per SKU.
  Join target from line_items for category and pricing context.

grain: one row per product
primary_key: id

dimensions:
  - name: sku
    sql: sku
    type: text
    description: Stock keeping unit identifier.

  - name: category
    sql: category
    type: text
    description: Merchandising category (e.g. apparel, electronics).

  - name: list_price
    sql: list_price
    type: numeric
    description: Current list price in the catalog.

joins:
  - to: line_items
    on: "products.id = line_items.product_id"
    type: one_to_many

example_questions:
  - "How many active products do we have?"
  - "Products by category count?"
