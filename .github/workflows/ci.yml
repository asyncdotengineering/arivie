# Green ⇒ shippable. The single gate that runs a CLEAN fresh build before
# typecheck/test/eval — so stale compiled dist can never mask a removed-symbol
# regression or a DTS cycle (the failure mode that broke the 3.0.0 publish).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # clean → build → typecheck → test → eval. The clean build is the load-bearing
      # step: typecheck/test against fresh dist, not last-run artifacts. eval runs in
      # PGlite + mock mode, so it needs no database and no API keys.
      - run: pnpm run verify
