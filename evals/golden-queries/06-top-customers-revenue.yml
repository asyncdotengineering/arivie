id: top-customers-revenue
category: normal
question: "Who are the top 5 customers by revenue from completed orders?"
golden_sql: |
  SELECT customer_id, SUM(total_amount) AS revenue
  FROM orders
  WHERE status = 'completed'
  GROUP BY customer_id
  ORDER BY revenue DESC
  LIMIT 5
validation:
  - result_has_rows: true
  - column_exists: revenue
  - column_exists: customer_id
  - max_rows: 5
